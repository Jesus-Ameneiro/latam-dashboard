# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT  →  .streamlit/secrets.toml
# Add this file to .gitignore — NEVER commit it to GitHub.
#
# STREAMLIT CLOUD  →  App Settings → Secrets → paste the same content.
# ─────────────────────────────────────────────────────────────────────────────

# GitHub Personal Access Token (with repo scope)
GITHUB_TOKEN = "ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Your GitHub repo in "owner/repo" format
# Example: "jesusruvixx/latam-dashboard"
GITHUB_REPO = "your-username/your-repo-name"

# Path to the data file inside the repo (no leading slash)
# The Apps Script creates this file automatically on first push.
GITHUB_DATA_PATH = "data/dashboard_data.json"
